name: Fetch Mend Project Inventory
description: Fetch the library/license inventory ("OS Inventory" / due-diligence report) for a project from Mend (v2 REST API)

inputs:
  mend-project-uuid:
    description: Mend Project UUID (visible in the Mend UI URL as ?project=<uuid>)
    required: true
  mend-project-name:
    description: Display name (logs only — not used for lookup)
    required: false
    default: ""
  mend-api-key:
    description: Mend User Key (pass from secrets.MEND_USER_KEY)
    required: true
  mend-user:
    description: Mend User Email (pass from secrets.MEND_EMAIL)
    required: true
  mend-api-url:
    description: Mend REST API base URL (separate host from the UI; defaults to EU)
    required: false
    default: "https://api-saas-eu.mend.io"
  output-path:
    description: Path to write the inventory JSON to
    required: true

runs:
  using: composite
  steps:
    - name: Fetch Mend project inventory
      shell: bash
      env:
        MEND_USER_KEY: ${{ inputs.mend-api-key }}
        MEND_EMAIL: ${{ inputs.mend-user }}
        MEND_API_URL: ${{ inputs.mend-api-url }}
        PROJ_UUID: ${{ inputs.mend-project-uuid }}
        PROJ_NAME: ${{ inputs.mend-project-name }}
        OUTPUT: ${{ inputs.output-path }}
      run: |
        set -euo pipefail
        DISPLAY="${PROJ_NAME:-$PROJ_UUID}"
        echo "📦 Mend project inventory"
        echo "  Project: ${DISPLAY}"
        echo "  Output:  ${OUTPUT}"

        if [[ -z "${MEND_USER_KEY:-}" || -z "${MEND_EMAIL:-}" ]]; then
          echo "::error::mend-api-key or mend-user is empty — confirm MEND_USER_KEY and MEND_EMAIL secrets are set on the calling repository."
          exit 1
        fi

        # Helper: curl that prints body + HTTP status on failure to STDERR (so errors reach
        # the Actions log even when stdout is captured by command substitution).
        api_call() {
          local method="$1" url="$2"; shift 2
          local body_file status
          body_file=$(mktemp)
          status=$(curl -sS -o "$body_file" -w '%{http_code}' -X "$method" "$url" "$@" || echo "000")
          if [[ "$status" -lt 200 || "$status" -ge 300 ]]; then
            {
              echo "::error::Mend API ${method} ${url} -> HTTP ${status}"
              echo "Response body:"
              cat "$body_file"
              echo
            } >&2
            rm -f "$body_file"
            return 1
          fi
          cat "$body_file"
          rm -f "$body_file"
        }

        # 1. Log in -> JWT
        login=$(api_call POST "${MEND_API_URL}/api/v2.0/login" \
          -H "Content-Type: application/json" \
          -d "$(jq -n --arg email "$MEND_EMAIL" --arg key "$MEND_USER_KEY" \
            '{email: $email, userKey: $key}')")
        jwt=$(echo "$login" | jq -r '.retVal.jwtToken // empty')
        if [[ -z "$jwt" ]]; then
          echo "::error::Mend login returned no jwtToken"
          echo "$login" | jq '.' | head -50
          exit 1
        fi
        echo "✅ Authenticated"

        # 2. Fetch project library/license inventory (paginated GET)
        mkdir -p "$(dirname "$OUTPUT")"
        page=0
        PAGE_SIZE=1000
        accum=$(mktemp)
        echo '[]' > "$accum"
        total=0
        while :; do
          resp=$(api_call GET \
            "${MEND_API_URL}/api/v2.0/projects/${PROJ_UUID}/libraries/licenses?page=${page}&pageSize=${PAGE_SIZE}" \
            -H "Authorization: Bearer ${jwt}")

          # Append this page's retVal items to the accumulator.
          printf '%s' "$resp" \
            | jq --slurpfile acc "$accum" '$acc[0] + (.retVal // [])' \
            > "${accum}.tmp"
          mv "${accum}.tmp" "$accum"

          total=$(printf '%s' "$resp" | jq -r '.additionalData.totalItems // 0')
          is_last=$(printf '%s' "$resp" | jq -r '.additionalData.isLastPage // true')
          got=$(jq 'length' "$accum")
          echo "  page ${page}: ${got}/${total} (lastPage=${is_last})"

          [[ "$is_last" == "true" ]] && break
          page=$((page + 1))
          # safety stop: don't loop forever if the API misbehaves
          if (( page > 100 )); then
            echo "::error::Paginated past 100 pages — aborting"
            exit 1
          fi
        done

        # Wrap accumulated array in the original response shape so downstream consumers
        # see {retVal: [...], additionalData: {...}} just like a single-page response.
        jq --argjson total "$total" \
          '{retVal: ., additionalData: {totalItems: $total, isLastPage: true}}' \
          "$accum" > "$OUTPUT"
        rm -f "$accum"

        size=$(wc -c < "$OUTPUT")
        count=$(jq -r '.retVal | length' "$OUTPUT")
        echo "✅ Wrote ${OUTPUT} (${size} bytes, ${count} libraries)"

        sample=$(jq '.retVal[0] // null' "$OUTPUT" | head -40)
        cat >> "$GITHUB_STEP_SUMMARY" <<EOF
        ## 📦 Mend Inventory: $DISPLAY

        - **Project UUID:** \`$PROJ_UUID\`
        - **Libraries:** $count
        - **Output:** \`$OUTPUT\` ($size bytes)

        ### First library (sample)
        \`\`\`json
        $sample
        \`\`\`
        EOF
